---
- name: Deploy Spring PetClinic to Production
  hosts: prod_vm
  become: yes

  vars:
    app_dir: /opt/petclinic
    app_user: petclinic

  tasks:
    - name: Create app user
      user:
        name: "{{ app_user }}"
        system: yes
        create_home: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Stop existing application
      systemd:
        name: petclinic
        state: stopped
      ignore_errors: yes

    - name: Copy JAR to production
      copy:
        src: "{{ artifact_path }}"
        dest: "{{ app_dir }}/spring-petclinic.jar"
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/petclinic.service
        content: |
          [Unit]
          Description=Spring PetClinic
          After=network.target

          [Service]
          User={{ app_user }}
          ExecStart=/usr/bin/java -jar {{ app_dir }}/spring-petclinic.jar
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Start and enable application
      systemd:
        name: petclinic
        state: started
        enabled: yes

    - name: Wait for app to start
      wait_for:
        port: 8080
        timeout: 60